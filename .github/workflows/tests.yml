name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.3', '8.4', '8.5']
        laravel-ai: ['^0.7', '^0.8']

    name: PHP ${{ matrix.php }} / laravel-ai ${{ matrix.laravel-ai }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer:v2

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache/files
          key: composer-${{ matrix.php }}-${{ matrix.laravel-ai }}-${{ hashFiles('composer.json') }}
          restore-keys: composer-${{ matrix.php }}-${{ matrix.laravel-ai }}-

      - name: Install dependencies
        run: |
          composer require "laravel/ai:${{ matrix.laravel-ai }}" --no-update --no-interaction
          composer update --no-progress --prefer-dist --no-interaction

      - name: Run test suite
        run: vendor/bin/pest --colors=always
